form_id: "postgraduate-recruitment-2026"
version: "1.0"

screens:
  - id: 1
    title: "Dane osobowe"
    subtitle: "Podstawowe informacje identyfikacyjne kandydata"
    fields:
      - id: "first_name"
        type: "text"
        label: "Imię (imiona)"
        placeholder: "np. Jan"
        required: true
        input_info: "Podaj wszystkie imiona zgodnie z dowodem osobistym."
      - id: "last_name"
        type: "text"
        label: "Nazwisko"
        placeholder: "np. Kowalski"
        required: true
      - id: "losowe_pole"
        type: "text"
        label: "Losowe Pole"
        placeholder: "XDDD"
        required: true
      - id: "family_name"
        type: "text"
        label: "Nazwisko rodowe"
        placeholder: "Wypełnij, jeśli inne niż obecne"
        required: false
      - id: "pesel"
        type: "text"
        label: "PESEL"
        placeholder: "00000000000"
        required: true
        regex: "^[0-9]{11}$"
        input_info: "Wymagane 11 cyfr."
      - id: "birth_date"
        type: "date"
        label: "Data urodzenia"
        required: true
      - id: "birth_place"
        type: "text"
        label: "Miejsce urodzenia"
        placeholder: "np. Warszawa"
        required: true
      - id: "citizenship"
        type: "text"
        label: "Obywatelstwo"
        placeholder: "np. polskie"
        required: true
    button_text: "Dalej: Adresy"

  - id: 2
    title: "Dane adresowe i kontaktowe"
    subtitle: "Gdzie możemy Cię znaleźć i jak się z Tobą kontaktować?"
    fields:
      - id: "residence_address"
        type: "text"
        label: "Adres zamieszkania"
        placeholder: "Ulica, numer domu/mieszkania, kod pocztowy, miasto"
        required: true
      - id: "correspondence_address"
        type: "text"
        label: "Adres do korespondencji"
        placeholder: "Wypełnij, jeśli inny niż zamieszkania"
        required: false
      - id: "email"
        type: "email"
        label: "Adres e-mail"
        placeholder: "twoj@email.pl"
        required: true
        regex: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
      - id: "phone"
        type: "tel"
        label: "Numer telefonu"
        placeholder: "+48 000 000 000"
        required: true
    button_text: "Dalej: Wykształcenie"

  - id: 3
    title: "Wykształcenie"
    subtitle: "Informacje o Twojej ścieżce edukacyjnej"
    fields:
      - id: "academic_title"
        type: "text"
        label: "Tytuł zawodowy"
        placeholder: "np. licencjat, magister, inżynier"
        required: true
      - id: "university_name"
        type: "text"
        label: "Nazwa szkoły wyższej"
        required: true
      - id: "graduation_year"
        type: "number"
        label: "Rok ukończenia studiów"
        placeholder: "RRRR"
        required: true
        regex: "^(19|20)\\d{2}$"
      - id: "high_school_diploma_country"
        type: "select"
        label: "Miejsce uzyskania świadectwa dojrzałości"
        required: true
        input_info: "Dane zbierane wyłącznie do celów statystycznych."
        options: ["Polska", "Poza Polską"]
      - id: "high_school_country_name"
        type: "text"
        label: "Kraj uzyskania świadectwa"
        required: false
        input_info: "Wypełnij tylko jeśli świadectwo uzyskano poza Polską"
    button_text: "Dalej: Zgody i kontakt awaryjny"

  - id: 4
    title: "Kontakt awaryjny i zgody"
    subtitle: "Ostatni krok przed wysłaniem zgłoszenia"
    fields:
      - id: "emergency_contact_header"
        type: "section_title"
        label: "Osoba do zawiadomienia w razie wypadku (opcjonalnie)"
      - id: "emergency_name"
        type: "text"
        label: "Imię i Nazwisko"
        required: false
      - id: "emergency_email"
        type: "email"
        label: "E-mail kontaktowy"
        required: false
      - id: "emergency_phone"
        type: "tel"
        label: "Telefon kontaktowy"
        required: false
      - id: "rodo_agreement"
        type: "checkbox"
        label: "Oświadczam, że dane są prawdziwe"
        required: true
      - id: "marketing_agreement"
        type: "checkbox"
        label: "Wyrażam zgodę na komunikację marketingową"
        required: false
        link: "https://uczelnia.pl/polityka-prywatnosci"
    button_text: "Wyślij zgłoszenie"
