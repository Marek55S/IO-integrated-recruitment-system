submission_id: "postgraduate-recruitment-2026-submission"
version: "1.0"
title: "Podsumowanie zgłoszenia"
subtitle: "Zweryfikuj dane przed ostatecznym wysłaniem"
# Id akcji z client/lib/content-form-actions.ts (pole primary na podsumowaniu / Wstecz)
submit_action: recruitment.submit
back_action: recruitment.back

sections:
  - id: "personal_data"
    title: "Dane osobowe"
    items:
      - field_id: "first_name"
        label: "Imię (imiona)"
      - field_id: "last_name"
        label: "Nazwisko"
      - field_id: "family_name"
        label: "Nazwisko rodowe"
      - field_id: "pesel"
        label: "PESEL"
      - field_id: "birth_date"
        label: "Data urodzenia"
      - field_id: "birth_place"
        label: "Miejsce urodzenia"
      - field_id: "citizenship"
        label: "Obywatelstwo"

  - id: "address_data"
    title: "Adres zamieszkania"
    items:
      - field_id: "residence_country"
        label: "Kraj"
      - field_id: "residence_city"
        label: "Miasto"
      - field_id: "residence_postal_code"
        label: "Kod pocztowy"
      - field_id: "residence_street"
        label: "Ulica"
      - field_id: "residence_house_number"
        label: "Nr domu/mieszkania"

  - id: "correspondence_data"
    title: "Adres do korespondencji"
    items:
      - field_id: "correspondence_same_as_residence"
        label: "Taki sam jak zamieszkania"
      - field_id: "correspondence_country"
        label: "Kraj"
      - field_id: "correspondence_city"
        label: "Miasto"
      - field_id: "correspondence_postal_code"
        label: "Kod pocztowy"
      - field_id: "correspondence_street"
        label: "Ulica"
      - field_id: "correspondence_house_number"
        label: "Nr domu/mieszkania"
      - field_id: "email"
        label: "E-mail"
      - field_id: "phone"
        label: "Telefon"

  - id: "education_data"
    title: "Wykształcenie"
    items:
      - field_id: "academic_title"
        label: "Tytuł zawodowy"
      - field_id: "university_name"
        label: "Nazwa szkoły wyższej"
      - field_id: "graduation_year"
        label: "Rok ukończenia"
      - field_id: "high_school_diploma_country"
        label: "Miejsce uzyskania świadectwa"
      - field_id: "high_school_country_name"
        label: "Kraj uzyskania świadectwa"

  - id: "emergency_contact"
    title: "Kontakt awaryjny"
    items:
      - field_id: "emergency_name"
        label: "Imię i nazwisko"
      - field_id: "emergency_email"
        label: "E-mail"
      - field_id: "emergency_phone"
        label: "Telefon"

agreements:
  - id: "rodo_agreement"
    label: "Oświadczam, że dane są prawdziwe"
    required: true
  - id: "marketing_agreement"
    label: "Wyrażam zgodę na komunikację marketingową"
    required: false
    link_text: "Polityka prywatności"
    link: "https://uczelnia.pl/polityka-prywatnosci"
