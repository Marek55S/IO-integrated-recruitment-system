program_id: inzynieria-systemow-sztucznej-inteligencji
title: Inzynieria systemow sztucznej inteligencji
description: 'Studia podyplomowe przygotowujace inzynierow do projektowania i wdrazania
  systemow opartych na sztucznej inteligencji. Program laczy teorie uczenia maszynowego
  z praktycznymi umiejetnosciami tworzenia skalowalnych aplikacji AI, obejmujac m.in.
  sieci neuronowe, przetwarzanie jezyka naturalnego i widzenie komputerowe.

  '
image_src: /programs/inzynieria-systemow-sztucznej-inteligencji.jpg
form:
