program_id: uczenie-maszynowe-w-analityce-danych
title: Uczenie maszynowe w analityce danych
description: 'Studia podyplomowe lacza teorię uczenia maszynowego z praktycznym zastosowaniem
  w analizie danych biznesowych. Program obejmuje algorytmy ML, Python (scikit-learn,
  TensorFlow), przetwarzanie danych i wdrazanie modeli produkcyjnych. Skierowany do
  analitykow danych i programistow chcacych specjalizowac sie w AI/ML.

  '
