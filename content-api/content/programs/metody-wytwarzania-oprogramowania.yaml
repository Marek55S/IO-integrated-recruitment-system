program_id: metody-wytwarzania-oprogramowania
title: Metody Wytwarzania Oprogramowania
description: 'Studia podyplomowe z zakresu inzynierii oprogramowania i nowoczesnych
  metodyk wytwarzania systemow informatycznych. Program obejmuje metodyki zwinne (Agile,
  Scrum), DevOps, testowanie, architekture mikrouslug oraz zarzadzanie jakoscia kodu.
  Skierowany do programistow i liderow technicznych chcacych poszerzyc kompetencje.

  '
