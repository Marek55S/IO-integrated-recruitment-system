program_id: systemy-erp-sap-s4hana
title: Systemy ERP - sciezka SAP S/4HANA
description: 'Studia podyplomowe ze sciezka SAP S/4HANA obejmujace kompleksowe wdrozenia
  i konfiguracje systemu SAP S/4HANA. Program laczy wiedze o procesach biznesowych
  z techniczna znajomoscia platformy SAP, przygotowujac do roli konsultanta SAP. Zajecia
  prowadzone online z dostepem do systemu SAP do cwiczen praktycznych.

  '
