program_id: systemy-erp-analiza-biznesowa
title: Systemy ERP - sciezka Analiza biznesowa w systemach ERP oraz BI
description: 'Studia podyplomowe ze sciezka Analiza biznesowa w systemach ERP oraz
  BI (Business Intelligence & Information Management). Program obejmuje systemy SAP,
  analize procesow biznesowych, raportowanie i Business Intelligence. Zajecia prowadzone
  online w formule weekendowej przez ekspertow SAP.

  '
image_src: /programs/systemy-erp-sciezka-analiza-biznesowa-w-systemach-erp-oraz-bi-business-intelligence-information-management.png
