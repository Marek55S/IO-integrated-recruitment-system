program_id: podstawy-analityki-danych-w-biznesie
title: Podstawy analityki danych w biznesie
description: 'Studia podyplomowe dla osob bez zaawansowanego tla technicznego, chcacych
  nauczyc sie analizy danych z perspektywy biznesowej. Program obejmuje Excel, SQL,
  Power BI, podstawy statystyki i metody prezentacji wynikow analiz. Idealne dla menedzerow,
  analitykow biznesowych i specjalistow z roznych branz.

  '
